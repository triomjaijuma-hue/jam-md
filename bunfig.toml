[install]
# Only run lifecycle scripts for packages explicitly listed as trustedDependencies
exact = false
frozenLockfile = false

[install.scopes]
# No private registry scopes needed

[run]
# Ensure Bun provides maximum Node.js compatibility when running index.js
# This enables all Node.js-compatible APIs including full 'ws' WebSocket support
bun-run-type = "js"
